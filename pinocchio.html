<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피노키오 - 원숭이와 토끼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:‘Jua’,sans-serif;
background:#fdf6e3;
overflow:hidden;
width:100vw; height:100vh;
cursor:pointer;
user-select:none;
}

#stage{position:relative;width:100%;height:100%;}

/* ── BACKGROUNDS ── */
.bg{position:absolute;inset:0;opacity:0;transition:opacity 1s;pointer-events:none;}
.bg.active{opacity:1;}

/* 0: 마을 */
#bg0{background:linear-gradient(180deg,#87ceeb 0%,#b8e4ff 55%,#7cb342 55%,#558b2f 100%);}
/* 1: 꽃밭 숲 */
#bg1{background:linear-gradient(180deg,#a5d6a7 0%,#66bb6a 45%,#388e3c 45%,#2e7d32 100%);}
/* 2: 과자집 */
#bg2{background:linear-gradient(180deg,#ff8f00 0%,#ffa726 40%,#e65100 40%,#bf360c 100%);}
/* 3: 감옥/어둠 */
#bg3{background:radial-gradient(ellipse at 50% 40%,#4a148c 0%,#311b92 50%,#1a0033 100%);}
/* 4: 탈출/밖 */
#bg4{background:linear-gradient(160deg,#fff9c4 0%,#ffee58 40%,#7cb342 40%,#558b2f 100%);}
/* 5: 집/해피엔딩 */
#bg5{background:linear-gradient(180deg,#ff8a65 0%,#ffb74d 45%,#8bc34a 45%,#689f38 100%);}

/* ── SKY ELEMENTS ── */
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.8;animation:drift linear infinite;}
@keyframes drift{from{transform:translateX(-150px)}to{transform:translateX(110vw)}}

/* ── TITLE CARD ── */
#title-card{
position:absolute;inset:0;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:linear-gradient(160deg,#fff8e1,#ffecb3,#ffe082);
z-index:60;
transition:opacity 1s;
}
#title-card .book-cover{
background:white;
border:4px solid #f57c00;
border-radius:16px;
padding:30px 40px;
text-align:center;
box-shadow:8px 8px 0 #f57c00, 16px 16px 0 rgba(0,0,0,0.1);
max-width:min(90vw,520px);
}
#title-card h1{font-size:clamp(1.8rem,6vw,3.2rem);color:#bf360c;line-height:1.2;margin-bottom:10px;}
#title-card .sub{font-size:clamp(1rem,3vw,1.5rem);color:#e65100;margin-bottom:20px;}
#title-card .chars{font-size:clamp(1.5rem,4vw,2.5rem);margin:10px 0;}
#title-card .tap{font-size:clamp(0.9rem,2.5vw,1.1rem);color:#795548;animation:blink 1.2s infinite alternate;margin-top:20px;}
@keyframes blink{from{opacity:0.3}to{opacity:1}}
@keyframes titleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── SCENE BANNER ── */
#scene-banner{
position:absolute;top:12px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,0.65);color:white;
padding:6px 24px;border-radius:20px;
font-size:clamp(0.85rem,2.2vw,1.1rem);
z-index:20;white-space:nowrap;
backdrop-filter:blur(4px);
}

/* ── DIALOG BOX ── */
#dialog{
position:absolute;bottom:13%;left:50%;transform:translateX(-50%);
width:min(92%,740px);
background:rgba(255,255,255,0.97);
border-radius:22px;
padding:0;
z-index:25;
box-shadow:0 8px 40px rgba(0,0,0,0.22);
overflow:hidden;
animation:popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popIn{from{transform:translateX(-50%) scale(0.5);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

#dialog-header{
padding:10px 20px 8px;
font-size:clamp(0.8rem,2vw,1rem);
font-weight:bold;
color:white;
display:flex;align-items:center;gap:8px;
}
#dialog-body{
padding:12px 20px 16px;
font-family:‘Gaegu’,cursive;
font-size:clamp(1rem,3vw,1.45rem);
color:#2d1b00;
line-height:1.6;
white-space:pre-wrap;
}

/* ── TYPEWRITER CURSOR ── */
#cursor{display:inline-block;width:2px;height:1.2em;background:#e65100;animation:cursorBlink 0.5s infinite alternate;vertical-align:middle;margin-left:2px;}
@keyframes cursorBlink{from{opacity:0}to{opacity:1}}

/* ── VOICE WAVE ── */
#voice-wave{
position:absolute;bottom:calc(13% + 105px);left:50%;transform:translateX(-50%);
display:flex;gap:3px;align-items:flex-end;height:20px;
opacity:0;transition:opacity 0.3s;z-index:26;
}
#voice-wave.on{opacity:1;}
#voice-wave span{
display:block;width:4px;background:#f57c00;border-radius:3px;
animation:waveBar 0.5s ease-in-out infinite alternate;
}
#voice-wave span:nth-child(1){animation-delay:0s}
#voice-wave span:nth-child(2){animation-delay:0.08s}
#voice-wave span:nth-child(3){animation-delay:0.16s}
#voice-wave span:nth-child(4){animation-delay:0.24s}
#voice-wave span:nth-child(5){animation-delay:0.32s}
#voice-wave span:nth-child(6){animation-delay:0.16s}
#voice-wave span:nth-child(7){animation-delay:0.08s}
@keyframes waveBar{from{height:3px}to{height:18px}}

/* ── CONTROLS ── */
#controls{
position:absolute;top:12px;right:12px;
display:flex;gap:8px;z-index:30;
}
.ctrl-btn{
background:rgba(255,255,255,0.9);
border:2px solid rgba(0,0,0,0.15);
border-radius:50%;width:42px;height:42px;
font-size:1.15rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
transition:transform 0.15s;
}
.ctrl-btn:hover{transform:scale(1.12);}

/* ── PROGRESS ── */
#progress{
position:absolute;bottom:2.5%;left:50%;transform:translateX(-50%);
display:flex;gap:7px;z-index:28;
}
.dot{width:9px;height:9px;border-radius:50%;background:#ddd;border:2px solid #bbb;transition:all 0.3s;}
.dot.done{background:#f57c00;border-color:#e65100;transform:scale(1.2);}

/* ── NEXT HINT ── */
#next-hint{
position:absolute;bottom:5.5%;right:4%;
font-size:clamp(0.75rem,2vw,0.95rem);
color:#f57c00;animation:blink 1s infinite alternate;
z-index:28;pointer-events:none;
}

/* ── CHARACTERS ── */
.char{
position:absolute;bottom:28%;
transition:left 0.9s cubic-bezier(.25,.46,.45,.94),
right 0.9s cubic-bezier(.25,.46,.45,.94),
opacity 0.6s, transform 0.4s;
}
.char svg{overflow:visible;}

/* animations */
.anim-float{animation:floatChar 2.8s ease-in-out infinite;}
@keyframes floatChar{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.anim-walk{animation:walkChar 0.45s ease-in-out infinite alternate;}
@keyframes walkChar{from{transform:translateY(0) rotate(-2deg)}to{transform:translateY(-10px) rotate(2deg)}}
.anim-shake{animation:shakeChar 0.35s 4;}
@keyframes shakeChar{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
.anim-jump{animation:jumpChar 0.55s ease-in-out 3;}
@keyframes jumpChar{0%,100%{transform:translateY(0)}50%{transform:translateY(-55px)}}
.anim-celebrate{animation:celebChar 0.55s ease-in-out infinite;}
@keyframes celebChar{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.18) rotate(-6deg)}75%{transform:scale(1.18) rotate(6deg)}}
.anim-scared{animation:scaredChar 0.3s ease-in-out infinite alternate;}
@keyframes scaredChar{from{transform:scale(0.95) rotate(-2deg)}to{transform:scale(1.05) rotate(2deg)}}
.anim-angry{animation:angryChar 0.25s ease-in-out infinite alternate;}
@keyframes angryChar{from{transform:scaleX(0.97) rotate(-1deg)}to{transform:scaleX(1.03) rotate(1deg)}}
.anim-eat{animation:eatChar 0.6s ease-in-out infinite alternate;}
@keyframes eatChar{from{transform:translateY(0)}to{transform:translateY(-6px) scale(1.05)}}
.anim-tip{animation:tipChar 2s ease-in-out infinite;}
@keyframes tipChar{0%,100%{transform:rotate(0)}30%{transform:rotate(-5deg)}60%{transform:rotate(5deg)}}

/* ── CONFETTI ── */
.confetti{position:absolute;width:10px;height:14px;border-radius:3px;pointer-events:none;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}

/* ── CAGE ── */
#cage{
position:absolute;bottom:25%;left:50%;transform:translateX(-50%);
width:200px;height:180px;
border:6px solid #555;border-radius:8px;
background:rgba(0,0,0,0.2);
display:none;z-index:15;
}
#cage::before{content:’’;position:absolute;inset:0;
background:repeating-linear-gradient(90deg,transparent,transparent 30px,#555 30px,#555 36px);
border-radius:4px;}

/* ── CANDY HOUSE ── */
#candy-house{
position:absolute;bottom:26%;left:50%;transform:translateX(-50%);
display:none;
}

/* ── MAGIC BUTTON ── */
#magic-btn-vis{
position:absolute;bottom:38%;left:50%;transform:translateX(-50%);
width:60px;height:60px;background:#4caf50;border-radius:50%;
border:4px solid #2e7d32;
display:none;z-index:20;
box-shadow:0 0 20px #4caf50;
animation:glowBtn 1s infinite alternate;
cursor:pointer;
align-items:center;justify-content:center;
font-size:1.5rem;
}
@keyframes glowBtn{from{box-shadow:0 0 10px #4caf50}to{box-shadow:0 0 30px #4caf50,0 0 50px #a5d6a7}}

/* ── STAR WAND ── */
.wand-star{display:none;}
</style>

</head>

<script>

const scenes = [
  {bg:0,banner:'🐒 1장: 원숭이와 토끼',chars:{cDog:{x:'20%',op:1},cCat:{x:'45%',op:1},cPanda:{x:'-20%',op:0},cWitch:{x:'-20%',op:0}},anim:{cDog:'float',cCat:'float'},speaker:'내레이터',speakerColor:'#4e342e',text:'옛날 옛날에 원숭이와 토끼가 마을에 살고 있었어요.',voice:{pitch:1.0,rate:0.88,volume:1}},
  {bg:0,banner:'🐒 1장: 원숭이와 토끼',chars:{cDog:{x:'20%',op:1},cCat:{x:'45%',op:1},cPanda:{x:'-20%',op:0},cWitch:{x:'-20%',op:0}},anim:{cDog:'float',cCat:'float'},speaker:'토끼 🐰',speakerColor:'#ab47bc',text:'"오호라, 이게 무슨 소리일까요?"\n"혹시 우리 꼬마 손님의 배에서 나는 소리일까요?"',voice:{pitch:1.3,rate:1.0,volume:1}},
  {bg:0,banner:'🐒 1장: 원숭이와 토끼',chars:{cDog:{x:'20%',op:1},cCat:{x:'45%',op:1},cPanda:{x:'-20%',op:0},cWitch:{x:'-20%',op:0}},anim:{cDog:'float',cCat:'float'},speaker:'원숭이 🐒',speakerColor:'#f57c00',text:'"그럼, 제가 아~주 맛있는 식사를 대접할까요?"\n"어~? 놀이터로 가야 하는데?"\n"아! 지금 안 먹으면 배에서 소리가 들려요. 정말 맛있거든!"\n"그럼, 음식을 먹고 갈까?"\n"잠깐만 기다려봐~ 호이, 얌얌얌! 다 됐어요!"',voice:{pitch:1.35,rate:1.0,volume:1}},
  {bg:1,banner:'🐘 2장: 코끼리 아저씨 레스토랑',chars:{cDog:{x:'15%',op:1},cCat:{x:'38%',op:1},cPanda:{x:'62%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'float',cCat:'float',cPanda:'float'},speaker:'내레이터',speakerColor:'#4e342e',text:'코끼리 아저씨 레스토랑에 도착했어요.\n"안녕하세요! 코끼리 아저씨!"\n"무슨 일이야?"\n"아주 귀여운 꼬마 손님을 모시고 왔어요."\n"잘 봐요! 주황색 원숭이랑, 보라색 토끼예요!"\n"어디, 어디? 주황 원숭이랑 보라 토끼가 왔어!"',voice:{pitch:1.0,rate:0.9,volume:1}},
  {bg:1,banner:'🐘 2장: 코끼리 아저씨 레스토랑',chars:{cDog:{x:'15%',op:1},cCat:{x:'38%',op:1},cPanda:{x:'62%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'eat',cCat:'eat',cPanda:'float'},speaker:'코끼리 아저씨 🐘',speakerColor:'#546e7a',text:'"지금 게임에 돈이 필요하거든."\n"이 코끼리 아저씨가 엄청 맛있는 음식으로 대접한다. 맞지?"\n"응, 그래? 들어와."\n"들어가지."\n"와!"\n"너희들 케어 준비했어."',voice:{pitch:0.8,rate:0.92,volume:1}},
  {bg:1,banner:'🐘 2장: 코끼리 아저씨 레스토랑',chars:{cDog:{x:'15%',op:1},cCat:{x:'38%',op:1},cPanda:{x:'62%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'eat',cCat:'eat',cPanda:'float'},speaker:'원숭이 🐒',speakerColor:'#f57c00',text:'"와! 맛있겠다."\n"여, 그런데, 가는?"\n"아~ 집으로 돌아간다. 신경 쓰지 말고 마음껏 들거라."\n"히힛, 먹자."\n"냠냠냠냠냠냠."\n"꿀꿀꿀."\n"컵, 냠냠."',voice:{pitch:1.35,rate:1.0,volume:1}},
  {bg:1,banner:'🐘 2장: 밥값 소동',chars:{cDog:{x:'15%',op:1},cCat:{x:'38%',op:1},cPanda:{x:'62%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'scared',cCat:'scared',cPanda:'float'},speaker:'코끼리 아저씨 🐘',speakerColor:'#546e7a',text:'"이제 어지간히 먹은 것 같구나."\n"어?"\n"그럼 내일 아침을 위한 연습을 시작할까?"\n"연습? 우린 밥을 먹었으니 놀이터로 갈게요."\n"놀이터? 없어!"\n"돌아가기 전에 너희가 먹은 밥값은 내야지!"\n"밥값?" "밥값?"\n"그게 아니고, 밥 값!"\n"그렇지! 흐흐흐흐흐.."',voice:{pitch:0.8,rate:1.0,volume:1}},
  {bg:2,banner:'🔒 3장: 감옥에 갇히다',chars:{cDog:{x:'22%',op:1},cCat:{x:'45%',op:1},cPanda:{x:'65%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'scared',cCat:'scared',cPanda:'angry'},speaker:'원숭이 🐒',speakerColor:'#f57c00',text:'"들어가!"\n"놔줘요."\n"비싼 밥을 먹었으면 밥값을 내야지!"\n"밥값을 드릴게요."',voice:{pitch:1.35,rate:1.1,volume:1}},
  {bg:2,banner:'🔒 3장: 거짓말과 긴 코',chars:{cDog:{x:'22%',op:1},cCat:{x:'45%',op:1},cPanda:{x:'65%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'scared',cCat:'scared',cPanda:'angry'},speaker:'코끼리 아저씨 🐘',speakerColor:'#546e7a',text:'"그, 그게 정말이야?"\n"네! 저 돈 많아요!", 어? 코가 왜이러지?\n"그 많은 돈이 어디 있는데?"\n"어.. 어디냐면, 맞다! 기스 트럭이 있어요."\n"오호, 거짓말을 하면 코가 길어지잖아. 기스 차에 얼마나 있는데?"\n"어.. 얼마냐면, 교실을 채울 만큼 있어요!"\n"하하하하. 교실이라면, 재미있군. 이걸로 내일 공연을 할 수 있겠어. 아침이 보자꾸나."',voice:{pitch:0.8,rate:0.92,volume:1}},
  {bg:2,banner:'🔒 3장: 탈출!',chars:{cDog:{x:'22%',op:1},cCat:{x:'45%',op:1},cPanda:{x:'-20%',op:0},cWitch:{x:'-20%',op:0}},anim:{cDog:'celebrate',cCat:'celebrate'},speaker:'원숭이 🐒',speakerColor:'#f57c00',text:'"토끼야, 우리도 할 수 있어. 와! 멋지다. 문을 열어볼까?"\n"그럴까?"\n원숭이와 토끼가 드디어 나왔어요!\n"도끼야! 뛰어!"\n"이녀석들! 놓치지 않겠다!"',voice:{pitch:1.35,rate:1.15,volume:1}},
  {bg:3,banner:'🎪 4장: 서커스장으로!',chars:{cDog:{x:'15%',op:1},cCat:{x:'38%',op:1},cPanda:{x:'-20%',op:0},cWitch:{x:'-20%',op:0}},anim:{cDog:'walk',cCat:'walk'},speaker:'내레이터',speakerColor:'#4e342e',text:'"토끼야, 우리 이제 살았어."\n"너희! 어! 저 서커스장으로 가는 주황 원숭이랑 보라 토끼, 다시 왔군!"\n"그게..."\n"그럼 내가 데리고 나와줄게."\n"맛있는 레스토랑으로 가자."\n"야호! 신난다."\n"자 이제 출발합니다."',voice:{pitch:1.0,rate:0.9,volume:1}},
  {bg:3,banner:'🎪 4장: 서커스장으로!',chars:{cDog:{x:'15%',op:1},cCat:{x:'38%',op:1},cPanda:{x:'62%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'eat',cCat:'eat',cPanda:'float'},speaker:'코끼리 아저씨 🐘',speakerColor:'#546e7a',text:'"참가자들, 열심히 하자."\n"이제부터 다시 출발하자."\n"그럼, 집에 갈 수 있어요?"\n"그럼 더 열심히 하자."\n"구운하신 음식 나왔습니다."\n"야오! 맛있겠다."\n"잠깐! 어디보자... 으흠, 맛있네! 너희도 먹어."',voice:{pitch:0.8,rate:0.92,volume:1}},
  {bg:3,banner:'🎪 4장: 기스가 혼자 먹다',chars:{cDog:{x:'15%',op:1},cCat:{x:'38%',op:1},cPanda:{x:'62%',op:1},cWitch:{x:'-20%',op:0}},anim:{cDog:'scared',cCat:'float',cPanda:'angry'},speaker:'내레이터',speakerColor:'#4e342e',text:'기스는 원숭이와 토끼를 빼놓고 음식을 혼자 배불리 먹었어요.\n"나도 먹고 싶었는데."\n"어우, 잘 먹었다."\n"어서 타!"\n"배불리 먹었으면 돈을 내야지."\n"자, 출발하자."',voice:{pitch:1.0,rate:0.9,volume:1}},

// ═══════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════
const totalSteps = scenes.length;
let step = -1;
let soundOn = true;
let autoPlay = false;
let autoTimer = null;
let speaking = false;

// build dots
const progEl = document.getElementById('progress');
for(let i=0;i<totalSteps;i++){
  const d=document.createElement('div'); d.className='dot'; progEl.appendChild(d);
}
const dots = progEl.querySelectorAll('.dot');

const titleCard = document.getElementById('title-card');
const bannerEl  = document.getElementById('scene-banner');
const dialogEl  = document.getElementById('dialog');
const headerEl  = document.getElementById('dialog-header');
const bodyEl    = document.getElementById('dialog-body');
const hintEl    = document.getElementById('next-hint');
const waveEl    = document.getElementById('voice-wave');
const btnSound  = document.getElementById('btnSound');
const btnReplay = document.getElementById('btnReplay');
const btnAuto   = document.getElementById('btnAuto');

const chars = {
  cDog:   document.getElementById('cDog'),
  cCat:   document.getElementById('cCat'),
  cPanda: document.getElementById('cPanda'),
  cWitch: document.getElementById('cWitch'),
};
const bgs = [0,1,2,3,4,5].map(i=>document.getElementById('bg'+i));

// speaker colors / emoji
const speakerMeta = {
  '강아지 🐶':     { bg:'#1565c0', emoji:'🐶' },
  '고양이 🐱':     { bg:'#c2185b', emoji:'🐱' },
  '판다 🐼':       { bg:'#e65100', emoji:'🐼' },
  '마녀 토끼 🐰':  { bg:'#6a1b9a', emoji:'🐰' },
  '내레이터':      { bg:'#4e342e', emoji:'📖' },
  '모두 함께 🎊':  { bg:'#e65100', emoji:'🎊' },
};

// ── TTS ──
let koVoice = null;
function loadVoices(){
  const vs = speechSynthesis.getVoices();
  koVoice = vs.find(v=>v.lang==='ko-KR') || vs.find(v=>v.lang.startsWith('ko')) || vs[0] || null;
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadVoices;

function speak(text, vParams, onDone){
  if(!soundOn){ if(onDone) onDone(); return; }
  speechSynthesis.cancel();
  // clean text for TTS
  const clean = text.replace(/[🎉🌸🍬🔮🌟🏠🎊📖🐶🐱🐼🐰🐾⭐]/g,'').replace(/\n/g,' ').trim();
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang   = 'ko-KR';
  utt.voice  = koVoice;
  utt.pitch  = vParams.pitch;
  utt.rate   = vParams.rate;
  utt.volume = vParams.volume;

  utt.onstart = ()=>{ speaking=true; waveEl.classList.add('on'); };
  utt.onend   = ()=>{ speaking=false; waveEl.classList.remove('on'); if(onDone) onDone(); };
  utt.onerror = ()=>{ speaking=false; waveEl.classList.remove('on'); if(onDone) onDone(); };

  speechSynthesis.speak(utt);
}

function stopSpeech(){
  speechSynthesis.cancel();
  speaking=false;
  waveEl.classList.remove('on');
}

// ── ANIMATIONS ──
const animList = ['float','walk','shake','jump','celebrate','scared','angry','eat','tip'];
function setAnim(el, anim){
  animList.forEach(a => el.classList.remove('anim-'+a));
  if(anim) el.classList.add('anim-'+anim);
}

// ── CONFETTI ──
function confetti(){
  const cols=['#f44336','#e91e63','#9c27b0','#2196f3','#4caf50','#ffeb3b','#ff9800','#00bcd4'];
  for(let i=0;i<55;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=cols[Math.floor(Math.random()*cols.length)];
    c.style.animationDuration=(1.8+Math.random()*2.5)+'s';
    c.style.animationDelay=(Math.random()*2)+'s';
    c.style.width=(8+Math.random()*8)+'px';
    c.style.height=(12+Math.random()*10)+'px';
    document.getElementById('stage').appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

// ── AUTO PLAY ──
function scheduleAuto(delay){
  clearTimeout(autoTimer);
  if(autoPlay) autoTimer = setTimeout(()=>advance(), delay);
}

// ── ADVANCE ──
function advance(){
  clearTimeout(autoTimer);
  stopSpeech();

  if(step===-1){
    titleCard.style.opacity='0';
    setTimeout(()=>titleCard.style.display='none',900);
    bannerEl.style.display='block';
    dialogEl.style.display='block';
    hintEl.style.display='block';
    step=0;
  } else {
    step++;
  }

  if(step>=totalSteps){
    step=-1;
    titleCard.style.display='flex';
    setTimeout(()=>titleCard.style.opacity='1',10);
    bannerEl.style.display='none';
    dialogEl.style.display='none';
    hintEl.style.display='none';
    dots.forEach(d=>d.classList.remove('done'));
    Object.values(chars).forEach(c=>{ c.style.opacity='0'; c.style.left='-25%'; });
    return;
  }

  const sc = scenes[step];

  // bg switch
  bgs.forEach((b,i)=>b.classList.toggle('active', i===sc.bg));

  // chars
  Object.entries(sc.chars).forEach(([id,cfg])=>{
    const el=chars[id];
    el.style.opacity=cfg.op;
    if(cfg.x!==undefined) el.style.left=cfg.x;
    if(cfg.right!==undefined){ el.style.left='auto'; el.style.right=cfg.right; }
  });

  // animations (delayed for transition)
  setTimeout(()=>{
    Object.keys(chars).forEach(id=>{
      const anim = sc.anim && sc.anim[id] ? sc.anim[id] : '';
      setAnim(chars[id], anim);
    });
  }, 500);

  // dialog
  const meta = speakerMeta[sc.speaker] || {bg:'#5d4037', emoji:'📖'};
  headerEl.style.background = sc.speakerColor || meta.bg;
  headerEl.innerHTML = `<span>${meta.emoji}</span> <span>${sc.speaker}</span>`;
  bodyEl.textContent = '';
  dialogEl.style.animation='none'; void dialogEl.offsetWidth;
  dialogEl.style.animation='popIn 0.4s cubic-bezier(.175,.885,.32,1.275)';

  // typewriter effect
  const fullText = sc.text;
  let i = 0;
  const cursor = document.createElement('span');
  cursor.id='cursor';
  bodyEl.appendChild(cursor);
  const typeInterval = setInterval(()=>{
    if(i<fullText.length){
      cursor.before(fullText[i]);
      i++;
    } else {
      clearInterval(typeInterval);
      cursor.remove();
    }
  }, 45);

  // voice
  setTimeout(()=>{
    speak(sc.text, sc.voice, ()=>{
      // after speech done, schedule auto if on
      scheduleAuto(1200);
    });
  }, 350);

  // confetti on final scene
  if(sc.bg===5 && step===totalSteps-1) setTimeout(confetti,500);

  // dots
  dots.forEach((d,i)=>d.classList.toggle('done', i<=step));
}

// ── CONTROLS ──
btnSound.addEventListener('click',e=>{
  e.stopPropagation();
  soundOn=!soundOn;
  btnSound.textContent = soundOn ? '🔊' : '🔇';
  if(!soundOn) stopSpeech();
  else if(step>=0&&step<totalSteps) speak(scenes[step].text, scenes[step].voice, ()=>scheduleAuto(1200));
});

btnReplay.addEventListener('click',e=>{
  e.stopPropagation();
  if(step>=0&&step<totalSteps){
    stopSpeech();
    speak(scenes[step].text, scenes[step].voice, ()=>scheduleAuto(1200));
    btnReplay.style.transform='rotate(360deg) scale(0.85)';
    setTimeout(()=>btnReplay.style.transform='',300);
  }
});

btnAuto.addEventListener('click',e=>{
  e.stopPropagation();
  autoPlay=!autoPlay;
  btnAuto.textContent = autoPlay ? '▶' : '⏸';
  if(autoPlay && !speaking) scheduleAuto(800);
  else clearTimeout(autoTimer);
});

document.getElementById('stage').addEventListener('click', advance);
</script>
