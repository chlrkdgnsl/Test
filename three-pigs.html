<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>아기 돼지 삼형제 🐷🐷🐷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;overflow:hidden;width:100vw;height:100vh;cursor:pointer;user-select:none;-webkit-user-select:none;background:#ffecd2;}
#stage{position:relative;width:100%;height:100%;overflow:hidden;}

.bg{position:absolute;inset:0;opacity:0;transition:opacity 1s;pointer-events:none;}
.bg.active{opacity:1;}
#bg0{background:linear-gradient(180deg,#ffecd2 0%,#fcb69f 42%,#7cb342 42%,#558b2f 100%);}
#bg1{background:linear-gradient(180deg,#87ceeb 0%,#b8e4ff 44%,#66bb6a 44%,#388e3c 100%);}
#bg2{background:linear-gradient(180deg,#90caf9 0%,#bbdefb 44%,#a5d6a7 44%,#66bb6a 100%);}
#bg3{background:linear-gradient(180deg,#9575cd 0%,#7e57c2 42%,#4a148c 42%,#311b92 100%);}
#bg4{background:linear-gradient(180deg,#bf360c 0%,#e64a19 40%,#7f0000 40%,#4a0000 100%);}
#bg5{background:linear-gradient(180deg,#fff9c4 0%,#ffee58 44%,#8bc34a 44%,#558b2f 100%);}

/* clouds */
.cloud{position:absolute;background:white;border-radius:60px;animation:cDrift linear infinite;}
@keyframes cDrift{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}

/* ground decoration */
.ground{position:absolute;bottom:0;left:0;width:100%;height:30%;pointer-events:none;}

/* TITLE */
#title{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
background:linear-gradient(160deg,#fff8e1,#ffecb3,#ffe082);z-index:70;transition:opacity 0.8s;}
.cover{background:white;border:5px solid #f57c00;border-radius:20px;padding:28px 36px;text-align:center;
box-shadow:7px 7px 0 #f57c00,14px 14px 0 rgba(0,0,0,0.07);max-width:min(88vw,480px);}
.cover h1{font-size:clamp(1.9rem,7vw,3.5rem);color:#bf360c;line-height:1.2;margin-bottom:8px;
animation:hBob 1s ease-in-out infinite alternate;}
@keyframes hBob{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.cover .sub{font-size:clamp(1rem,3vw,1.4rem);color:#e65100;margin-bottom:14px;}
.cover .tap{font-size:clamp(0.9rem,2.5vw,1.1rem);color:#795548;animation:pulse 1s infinite alternate;margin-top:14px;}
@keyframes pulse{from{opacity:0.3}to{opacity:1}}

/* BANNER */
#banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,0.68);color:white;padding:7px 24px;border-radius:20px;
font-size:clamp(0.85rem,2.2vw,1.05rem);z-index:30;white-space:nowrap;display:none;}

/* DIALOG */
#dialog{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);
width:min(92%,740px);background:rgba(255,255,255,0.97);border-radius:20px;overflow:hidden;
box-shadow:0 10px 45px rgba(0,0,0,0.28);z-index:28;display:none;
animation:dPop 0.4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes dPop{from{transform:translateX(-50%) scale(0.4);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
#dhead{padding:10px 20px 8px;color:white;font-size:clamp(0.85rem,2vw,1rem);display:flex;align-items:center;gap:8px;}
#dbody{padding:14px 20px 18px;font-family:‘Gaegu’,cursive;font-size:clamp(1rem,3vw,1.45rem);color:#1a0000;line-height:1.65;white-space:pre-wrap;}

/* cursor */
#cur{display:inline-block;width:2px;height:1.1em;background:#e65100;margin-left:2px;vertical-align:middle;animation:cb 0.5s steps(1) infinite;}
@keyframes cb{0%,100%{opacity:1}50%{opacity:0}}

/* voice wave */
#vw{position:absolute;bottom:calc(12% + 108px);left:50%;transform:translateX(-50%);
display:flex;gap:3px;align-items:flex-end;height:20px;opacity:0;transition:opacity 0.3s;z-index:29;}
#vw.on{opacity:1;}
#vw span{display:block;width:4px;background:#f57c00;border-radius:3px;animation:wb 0.45s ease-in-out infinite alternate;}
#vw span:nth-child(1){animation-delay:0s}#vw span:nth-child(2){animation-delay:.07s}
#vw span:nth-child(3){animation-delay:.14s}#vw span:nth-child(4){animation-delay:.21s}
#vw span:nth-child(5){animation-delay:.28s}#vw span:nth-child(6){animation-delay:.14s}
#vw span:nth-child(7){animation-delay:.07s}
@keyframes wb{from{height:3px}to{height:18px}}

/* controls */
#ctrls{position:absolute;top:12px;right:12px;display:flex;gap:8px;z-index:40;}
.cb{background:rgba(255,255,255,0.92);border:2px solid rgba(0,0,0,0.1);border-radius:50%;
width:44px;height:44px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
box-shadow:0 3px 10px rgba(0,0,0,0.15);transition:transform 0.15s;-webkit-tap-highlight-color:transparent;}
.cb:active{transform:scale(0.88);}

/* progress */
#prog{position:absolute;bottom:2.5%;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:30;}
.dot{width:9px;height:9px;border-radius:50%;background:#ddd;border:2px solid #bbb;transition:all 0.3s;}
.dot.on{background:#f57c00;border-color:#e65100;transform:scale(1.25);}

/* hint */
#hint{position:absolute;bottom:5.5%;right:4%;font-size:clamp(0.75rem,2vw,0.95rem);color:#f57c00;
animation:pulse 1s infinite alternate;z-index:30;pointer-events:none;display:none;}

/* CHARACTERS */
.ch{position:absolute;bottom:28%;transition:left 0.9s cubic-bezier(.25,.46,.45,.94),opacity 0.6s;}
.ch svg{overflow:visible;}

/* houses */
.house{position:absolute;bottom:27%;display:none;}

/* WIND */
#wind{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:0;transition:opacity 0.4s;}
#wind.on{opacity:1;}
.wl{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.65),transparent);
border-radius:2px;animation:wm linear infinite;}
@keyframes wm{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}

/* FIRE emoji */
#fire{position:absolute;bottom:30%;right:18%;font-size:3.5rem;display:none;
animation:ff 0.3s infinite alternate;}
@keyframes ff{from{transform:scaleY(1) rotate(-3deg)}to{transform:scaleY(1.18) rotate(3deg)}}

/* CHAR ANIMATIONS */
.af{animation:aFloat 2.8s ease-in-out infinite;}
@keyframes aFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.aw{animation:aWalk 0.45s ease-in-out infinite alternate;}
@keyframes aWalk{from{transform:translateY(0) rotate(-2deg)}to{transform:translateY(-10px) rotate(2deg)}}
.as_sc{animation:aSc 0.28s ease-in-out infinite alternate;}
@keyframes aSc{from{transform:scale(0.94) rotate(-2deg)}to{transform:scale(1.06) rotate(2deg)}}
.as_an{animation:aAn 0.22s ease-in-out infinite alternate;}
@keyframes aAn{from{transform:scaleX(0.96)}to{transform:scaleX(1.04)}}
.aj{animation:aJump 0.55s ease-in-out 3;}
@keyframes aJump{0%,100%{transform:translateY(0)}50%{transform:translateY(-58px)}}
.ac{animation:aCel 0.55s ease-in-out infinite;}
@keyframes aCel{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.18) rotate(-6deg)}75%{transform:scale(1.18) rotate(6deg)}}
.ar{animation:aRun 0.3s ease-in-out infinite alternate;}
@keyframes aRun{from{transform:translateY(-4px) rotate(-4deg)}to{transform:translateY(-14px) rotate(4deg)}}
.am{animation:aMag 0.5s ease-in-out infinite alternate;}
@keyframes aMag{from{transform:rotate(-8deg) scale(0.97)}to{transform:rotate(8deg) scale(1.03)}}

/* CONFETTI */
.cf{position:absolute;border-radius:3px;pointer-events:none;animation:cfF linear forwards;}
@keyframes cfF{0%{transform:translateY(-40px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}

/* SCREEN SHAKE */
@keyframes sShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,3px)}60%{transform:translate(4px,-2px)}}
.shake{animation:sShake 0.35s ease-in-out 2;}

/* STAR */
.sb{position:absolute;pointer-events:none;animation:sbA 0.6s ease-out forwards;font-size:2.5rem;}
@keyframes sbA{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}
</style>

</head>

// Called inside every user-gesture handler → safe on iOS
function ensureCtx() {
if (ctx) {
if (ctx.state === ‘suspended’) { try { ctx.resume(); } catch(e){} }
return true;
}
try {
var C = window.AudioContext || window.webkitAudioContext;
if (!C) return false;
ctx = new C();
return true;
} catch(e) { ctx = null; return false; }

function stopBGM() {
bgmRunning = false;
if (bgmGainNode) {
try { bgmGainNode.gain.setValueAtTime(0, ctx.currentTime); } catch(e){}
bgmGainNode = null;
}
}

function scheduleBGMNote() {
if (!bgmRunning || !ctx || !bgmGainNode || bgmNotes.length === 0) return;
try {
var osc = ctx.createOscillator();
var g   = ctx.createGain();
osc.connect(g);
g.connect(bgmGainNode);
osc.frequency.value = bgmNotes[bgmNoteIdx % bgmNotes.length];
osc.type = (bgmTempo < 0.2) ? ‘sawtooth’ : ‘triangle’;
var t = ctx.currentTime;
g.gain.setValueAtTime(0.35, t);
g.gain.exponentialRampToValueAtTime(0.01, t + bgmTempo * 0.85);
osc.start(t);
osc.stop(t + bgmTempo);
bgmNoteIdx++;
osc.onended = function() { if (bgmRunning) scheduleBGMNote(); };
} catch(e) { bgmRunning = false; }
}

function loadVoices() {
var vs = speechSynthesis.getVoices();

loadVoices();

speechSynthesis.onvoiceschanged = loadVoices;

function speak(text, vp, onDone) {
if (!sndEnabled) { if (onDone) onDone(); return; }
try { speechSynthesis.cancel(); } catch(e) {}
// strip emoji for cleaner TTS
var clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu, ‘’)
.replace(/[\u2600-\u27BF]/g, ‘’)
.replace(/\n/g, ’ ’).trim();
try {
var utt = new SpeechSynthesisUtterance(clean);
utt.lang   = ‘ko-KR’;
if (koVoice) utt.voice = koVoice;
utt.pitch  = vp.pitch;
utt.rate   = vp.rate;
utt.volume = 1;
var vwEl = document.getElementById(‘vw’);
utt.onstart = function() { vwEl.classList.add(‘on’); };
utt.onend   = function() { vwEl.classList.remove(‘on’); if (onDone) onDone(); };
utt.onerror = function() { vwEl.classList.remove(‘on’); if (onDone) onDone(); };
speechSynthesis.speak(utt);
} catch(e) { if (onDone) onDone(); }
}

function stopSpeak() {
try { speechSynthesis.cancel(); } catch(e) {}
document.getElementById(‘vw’).classList.remove(‘on’);
}

// Single unified tap/click handler — avoids double-fire on iOS
var lastTap = 0;
document.getElementById(‘stage’).addEventListener(‘touchend’, function(e) {
var now = Date.now();
if (now - lastTap < 350) return; // debounce
lastTap = now;
// only advance if touch didn’t move (i.e. it’s a tap, not a scroll)
advance();
}, false);
document.getElementById(‘stage’).addEventListener(‘click’, function(e) {
// on desktop (no touch), fire normally
// on touch devices touchend already fired — skip to avoid double
if (Date.now() - lastTap < 350) return;
advance();
});
