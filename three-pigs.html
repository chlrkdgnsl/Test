<html lang="ko">
<head>

<title>아기 돼지 삼형제</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jua',sans-serif;background:#fdf6e3;overflow:hidden;width:100vw;height:100vh;cursor:pointer;user-select:none;}
#stage{position:relative;width:100%;height:100%;}
.bg{position:absolute;inset:0;opacity:0;transition:opacity 1s;pointer-events:none;}
.bg.active{opacity:1;}
#bg0{background:linear-gradient(180deg,#ffecd2 0%,#fcb69f 42%,#7cb342 42%,#558b2f 100%);}
#bg1{background:linear-gradient(180deg,#87ceeb 0%,#b8e4ff 44%,#66bb6a 44%,#388e3c 100%);}
#bg2{background:linear-gradient(180deg,#90caf9 0%,#bbdefb 44%,#a5d6a7 44%,#66bb6a 100%);}
#bg3{background:linear-gradient(180deg,#9575cd 0%,#7e57c2 42%,#4a148c 42%,#311b92 100%);}
#bg4{background:linear-gradient(180deg,#bf360c 0%,#e64a19 40%,#7f0000 40%,#4a0000 100%);}
#bg5{background:linear-gradient(180deg,#fff9c4 0%,#ffee58 44%,#8bc34a 44%,#558b2f 100%);}
.cloud{position:absolute;background:white;border-radius:60px;animation:cloudDrift linear infinite;}
@keyframes cloudDrift{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}
#title-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#fff8e1,#ffecb3,#ffe082);z-index:60;transition:opacity 1s;}
.book-cover{background:white;border:5px solid #f57c00;border-radius:20px;padding:30px 44px;text-align:center;box-shadow:8px 8px 0 #f57c00,16px 16px 0 rgba(0,0,0,0.07);max-width:min(90vw,500px);}
.book-cover h1{font-size:clamp(1.8rem,6vw,3.2rem);color:#bf360c;line-height:1.2;margin-bottom:10px;}
.book-cover .sub{font-size:clamp(1rem,3vw,1.4rem);color:#e65100;margin-bottom:16px;}
.book-cover .tap{font-size:clamp(0.9rem,2.5vw,1.1rem);color:#795548;animation:blink 1.2s infinite alternate;margin-top:16px;}
@keyframes blink{from{opacity:0.3}to{opacity:1}}
@keyframes titleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#scene-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:white;padding:6px 24px;border-radius:20px;font-size:clamp(0.85rem,2.2vw,1.1rem);z-index:20;white-space:nowrap;}
#dialog{position:absolute;bottom:13%;left:50%;transform:translateX(-50%);width:min(92%,740px);background:rgba(255,255,255,0.97);border-radius:22px;padding:0;z-index:25;box-shadow:0 8px 40px rgba(0,0,0,0.22);overflow:hidden;animation:popIn 0.4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:translateX(-50%) scale(0.5);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
#dialog-header{padding:10px 20px 8px;font-size:clamp(0.8rem,2vw,1rem);font-weight:bold;color:white;display:flex;align-items:center;gap:8px;}
#dialog-body{padding:12px 20px 16px;font-family:'Gaegu',cursive;font-size:clamp(1rem,3vw,1.45rem);color:#2d1b00;line-height:1.6;white-space:pre-wrap;}
#cursor{display:inline-block;width:2px;height:1.2em;background:#e65100;animation:curBlink 0.5s infinite alternate;vertical-align:middle;margin-left:2px;}
@keyframes curBlink{from{opacity:0}to{opacity:1}}
#voice-wave{position:absolute;bottom:calc(13% + 105px);left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end;height:20px;opacity:0;transition:opacity 0.3s;z-index:26;}
#voice-wave.on{opacity:1;}
#voice-wave span{display:block;width:4px;background:#f57c00;border-radius:3px;animation:waveBar 0.5s ease-in-out infinite alternate;}
#voice-wave span:nth-child(1){animation-delay:0s}#voice-wave span:nth-child(2){animation-delay:0.08s}#voice-wave span:nth-child(3){animation-delay:0.16s}#voice-wave span:nth-child(4){animation-delay:0.24s}#voice-wave span:nth-child(5){animation-delay:0.32s}
@keyframes waveBar{from{height:3px}to{height:18px}}
#controls{position:absolute;top:12px;right:12px;display:flex;gap:8px;z-index:30;}
.ctrl-btn{background:rgba(255,255,255,0.9);border:2px solid rgba(0,0,0,0.15);border-radius:50%;width:42px;height:42px;font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,0.15);}
#progress{position:absolute;bottom:2.5%;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:28;}
.dot{width:9px;height:9px;border-radius:50%;background:#ddd;border:2px solid #bbb;transition:all 0.3s;}
.dot.done{background:#f57c00;border-color:#e65100;transform:scale(1.2);}
#next-hint{position:absolute;bottom:5.5%;right:4%;font-size:clamp(0.75rem,2vw,0.95rem);color:#f57c00;animation:blink 1s infinite alternate;z-index:28;pointer-events:none;}
.char-wrap{position:absolute;bottom:28%;transition:left 0.9s cubic-bezier(.25,.46,.45,.94),right 0.9s,opacity 0.6s;}
.char-wrap svg{overflow:visible;}
.house{position:absolute;bottom:27%;display:none;}
#wind-lines{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:0;transition:opacity 0.5s;}
#wind-lines.active{opacity:1;}
.wind-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);border-radius:2px;animation:windMove linear infinite;}
@keyframes windMove{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}
#fire-anim{position:absolute;bottom:28%;right:20%;font-size:4rem;display:none;animation:fireFlick 0.3s infinite alternate;}
@keyframes fireFlick{from{transform:scaleY(1) rotate(-3deg)}to{transform:scaleY(1.15) rotate(3deg)}}
.anim-float{animation:floatChar 2.8s ease-in-out infinite;}
@keyframes floatChar{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.anim-scared{animation:scaredChar 0.3s ease-in-out infinite alternate;}
@keyframes scaredChar{from{transform:scale(0.95) rotate(-2deg)}to{transform:scale(1.05) rotate(2deg)}}
.anim-angry{animation:angryChar 0.25s ease-in-out infinite alternate;}
@keyframes angryChar{from{transform:scaleX(0.97)}to{transform:scaleX(1.03)}}
.anim-jump{animation:jumpChar 0.55s ease-in-out 3;}
@keyframes jumpChar{0%,100%{transform:translateY(0)}50%{transform:translateY(-55px)}}
.anim-celebrate{animation:celebChar 0.55s ease-in-out infinite;}
@keyframes celebChar{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.18) rotate(-6deg)}75%{transform:scale(1.18) rotate(6deg)}}
.anim-run{animation:runChar 0.3s ease-in-out infinite alternate;}
@keyframes runChar{from{transform:translateY(-4px) rotate(-4deg)}to{transform:translateY(-14px) rotate(4deg)}}
.anim-magic{animation:magicChar 0.5s ease-in-out infinite alternate;}
@keyframes magicChar{from{transform:rotate(-8deg) scale(0.97)}to{transform:rotate(8deg) scale(1.03)}}
.confetti{position:absolute;border-radius:3px;pointer-events:none;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}
</style>

const totalSteps=scenes.length;
let step=-1,soundOn=true,autoPlay=false,autoTimer=null,speaking=false;
const progEl=document.getElementById(‘progress’);
for(let i=0;i<totalSteps;i++){const d=document.createElement(‘div’);d.className=‘dot’;progEl.appendChild(d);}
const dots=progEl.querySelectorAll(’.dot’);
const titleCard=document.getElementById(‘title-card’);
const bannerEl=document.getElementById(‘scene-banner’);
const dialogEl=document.getElementById(‘dialog’);
const headerEl=document.getElementById(‘dialog-header’);
const bodyEl=document.getElementById(‘dialog-body’);
const hintEl=document.getElementById(‘next-hint’);
const waveEl=document.getElementById(‘voice-wave’);
const btnSound=document.getElementById(‘btnSound’);
const btnReplay=document.getElementById(‘btnReplay’);
const btnAuto=document.getElementById(‘btnAuto’);
const windEl=document.getElementById(‘wind-lines’);
const fireEl=document.getElementById(‘fire-anim’);
const chars={c1:document.getElementById(‘c1’),c2:document.getElementById(‘c2’),c3:document.getElementById(‘c3’),cWolf:document.getElementById(‘cWolf’)};
const houseEls={hStraw:document.getElementById(‘hStraw’),hWood:document.getElementById(‘hWood’),hBrick:document.getElementById(‘hBrick’)};
const bgs=[0,1,2,3,4,5].map(i=>document.getElementById(‘bg’+i));
const speakerMeta={‘내레이터’:{bg:’#4e342e’,emoji:‘📖’},‘삼형제 🐷🐷🐷’:{bg:’#f57c00’,emoji:‘🐷’},‘삼형제 🐷’:{bg:’#e65100’,emoji:‘🐷’},‘늑대 🐺’:{bg:’#424242’,emoji:‘🐺’},‘첫째 🐷’:{bg:’#c2185b’,emoji:‘🐷’},‘셋째 🐷’:{bg:’#1976d2’,emoji:‘🐷’}};
let koVoice=null;
function loadVoices(){const vs=speechSynthesis.getVoices();koVoice=vs.find(v=>v.lang===‘ko-KR’)||vs.find(v=>v.lang.startsWith(‘ko’))||vs[0]||null;}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadVoices;
function speak(text,vp,onDone){
if(!soundOn){if(onDone)onDone();return;}
speechSynthesis.cancel();
const clean=text.replace(/[🐷🐺📖🌾🌲🧱🔥🏃🎉]/g,’’).replace(/\n/g,’ ‘).trim();
const utt=new SpeechSynthesisUtterance(clean);
utt.lang=‘ko-KR’;utt.voice=koVoice;utt.pitch=vp.pitch;utt.rate=vp.rate;utt.volume=vp.volume;
utt.onstart=()=>{speaking=true;waveEl.classList.add(‘on’);};
utt.onend=()=>{speaking=false;waveEl.classList.remove(‘on’);if(onDone)onDone();};
utt.onerror=()=>{speaking=false;waveEl.classList.remove(‘on’);if(onDone)onDone();};
speechSynthesis.speak(utt);
}
function stopSpeech(){speechSynthesis.cancel();speaking=false;waveEl.classList.remove(‘on’);}
const animList=[‘float’,‘scared’,‘angry’,‘jump’,‘celebrate’,‘run’,‘magic’];
function setAnim(el,anim){animList.forEach(a=>el.classList.remove(‘anim-’+a));if(anim)el.classList.add(‘anim-’+anim);}
function confetti(){const cols=[’#f44336’,’#e91e63’,’#9c27b0’,’#2196f3’,’#4caf50’,’#ffeb3b’,’#ff9800’];for(let i=0;i<55;i++){const c=document.createElement(‘div’);c.className=‘confetti’;c.style.left=Math.random()*100+‘vw’;c.style.background=cols[Math.floor(Math.random()*cols.length)];c.style.animationDuration=(1.8+Math.random()*2.5)+‘s’;c.style.animationDelay=(Math.random()*2)+‘s’;c.style.width=(8+Math.random()*8)+‘px’;c.style.height=(12+Math.random()*10)+‘px’;document.getElementById(‘stage’).appendChild(c);setTimeout(()=>c.remove(),5000);}}
function scheduleAuto(delay){clearTimeout(autoTimer);if(autoPlay)autoTimer=setTimeout(()=>advance(),delay);}
function advance(){
clearTimeout(autoTimer);stopSpeech();
if(step===-1){titleCard.style.opacity=‘0’;setTimeout(()=>titleCard.style.display=‘none’,900);bannerEl.style.display=‘block’;dialogEl.style.display=‘block’;hintEl.style.display=‘block’;step=0;}
else{step++;}
if(step>=totalSteps){step=-1;titleCard.style.display=‘flex’;setTimeout(()=>titleCard.style.opacity=‘1’,10);bannerEl.style.display=‘none’;dialogEl.style.display=‘none’;hintEl.style.display=‘none’;windEl.classList.remove(‘active’);fireEl.style.display=‘none’;dots.forEach(d=>d.classList.remove(‘done’));Object.values(chars).forEach(c=>{c.style.opacity=‘0’;c.style.left=’-25%’;});Object.values(houseEls).forEach(h=>h.style.display=‘none’);return;}
const sc=scenes[step];
bgs.forEach((b,i)=>b.classList.toggle(‘active’,i===sc.bg));
Object.entries(sc.houses||{}).forEach(([k,v])=>{if(houseEls[k])houseEls[k].style.display=v?‘block’:‘none’;});
windEl.classList.toggle(‘active’,!!sc.wind);
fireEl.style.display=sc.fire?‘block’:‘none’;
Object.entries(sc.chars).forEach(([id,cfg])=>{const el=chars[id];if(!el)return;el.style.opacity=cfg.op;if(cfg.x!==undefined)el.style.left=cfg.x;if(cfg.right!==undefined){el.style.left=‘auto’;el.style.right=cfg.right;}});
setTimeout(()=>{Object.keys(chars).forEach(id=>{setAnim(chars[id],sc.anim&&sc.anim[id]?sc.anim[id]:’’);});},500);
const meta=speakerMeta[sc.speaker]||{bg:’#4e342e’,emoji:‘📖’};
headerEl.style.background=sc.speakerColor||meta.bg;
headerEl.innerHTML=`<span>${meta.emoji}</span> <span>${sc.speaker}</span>`;
bodyEl.textContent=’’;
dialogEl.style.animation=‘none’;void dialogEl.offsetWidth;
dialogEl.style.animation=‘popIn 0.4s cubic-bezier(.175,.885,.32,1.275)’;
const fullText=sc.text;let i=0;
const cursor=document.createElement(‘span’);cursor.id=‘cursor’;bodyEl.appendChild(cursor);
const typeInterval=setInterval(()=>{if(i<fullText.length){cursor.before(fullText[i]);i++;}else{clearInterval(typeInterval);cursor.remove();}},45);
setTimeout(()=>{speak(sc.text,sc.voice,()=>{scheduleAuto(1200);});},350);
if(sc.bg===5&&step===totalSteps-1)setTimeout(confetti,500);
bannerEl.textContent=sc.banner;
dots.forEach((d,i)=>d.classList.toggle(‘done’,i<=step));
}
btnSound.addEventListener(‘click’,e=>{e.stopPropagation();soundOn=!soundOn;btnSound.textContent=soundOn?‘🔊’:‘🔇’;if(!soundOn)stopSpeech();else if(step>=0&&step<totalSteps)speak(scenes[step].text,scenes[step].voice,()=>scheduleAuto(1200));});
btnReplay.addEventListener(‘click’,e=>{e.stopPropagation();if(step>=0&&step<totalSteps){stopSpeech();speak(scenes[step].text,scenes[step].voice,()=>scheduleAuto(1200));}});
btnAuto.addEventListener(‘click’,e=>{e.stopPropagation();autoPlay=!autoPlay;btnAuto.textContent=autoPlay?‘▶’:‘⏸’;if(autoPlay&&!speaking)scheduleAuto(800);else clearTimeout(autoTimer);});
document.getElementById(‘stage’).addEventListener(‘click’,advance);
</script>
